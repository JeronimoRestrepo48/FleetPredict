{% extends "base.html" %}
{% block title %}Delete threshold - FleetPredict Pro{% endblock %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
  <h2 class="page-title mb-0">Delete threshold</h2>
  <a href="{% url 'dashboard:alertthreshold_list' %}" class="btn btn-outline-secondary">Back</a>
</div>
<div class="card card-fp">
  <div class="card-body">
    <p>Are you sure you want to delete this threshold?</p>
    <p class="fw-medium">{{ object }}</p>
    <form method="post" class="mt-3">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Delete</button>
      <a href="{% url 'dashboard:alertthreshold_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}

services:
  web:
    build: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fleetpredict
      POSTGRES_USER: fleetpredict
      POSTGRES_PASSWORD: fleetpredict
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  postgres_data:
  media_data:
  static_data:

